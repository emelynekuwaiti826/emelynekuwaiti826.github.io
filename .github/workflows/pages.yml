name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A4618A: ${{ secrets.A4618A }}
          B05448: ${{ secrets.B05448 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A4618A', '')
          tag_b = os.environ.get('B05448', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- a146004dde9cd36edaedab3fe092b56b3ae911ea -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- d40236e77db7a10c3ce2072f2962 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
